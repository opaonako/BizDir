<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Yellow Pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0f0f0f; --ink-2: #2a2a2a; --ink-3: #666;
      --paper: #ffffff; --surface: #f4f4f4; --accent: #FFD700;
      --accent-2: #FFC200; --accent-dark: #B8960A; --border: #e4e4e4; --card-bg: #ffffff;
      --green: #16a34a; --green-bg: #dcfce7;
      --yellow-bg: #fef9c3; --yellow: #854d0e;
      --font-head: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body { font-family: var(--font-body); background: var(--paper); color: var(--ink); min-height: 100vh; }

    /* NAV */
    nav { background: var(--ink); border-bottom: 3px solid var(--accent); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; text-decoration: none; line-height: 1; }
    .nav-logo .logo-yellow { background: var(--accent); color: var(--ink); font-family: var(--font-head); font-size: 1.5rem; letter-spacing: 0.02em; padding: 3px 9px 1px; border-radius: 4px 0 0 4px; }
    .nav-logo .logo-pages { background: transparent; color: var(--accent); font-family: var(--font-head); font-size: 1.5rem; letter-spacing: 0.05em; padding: 3px 9px 1px; border: 2px solid var(--accent); border-left: none; border-radius: 0 4px 4px 0; }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-user { font-size: 0.85rem; color: #aaa; }
    .btn-logout { font-size: 0.82rem; color: #aaa; background: none; border: 1.5px solid #333; padding: 6px 14px; border-radius: 7px; cursor: pointer; font-family: var(--font-body); transition: all 0.18s; }
    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    .page { max-width: 860px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .welcome { margin-bottom: 2rem; }
    .welcome h1 { font-family: var(--font-head); font-size: 2.4rem; letter-spacing: 0.03em; margin-bottom: 0.3rem; }
    .welcome p { color: var(--ink-3); font-size: 0.9rem; font-weight: 300; }

    /* STATUS BANNERS */
    .status-banner { padding: 14px 18px; border-radius: 12px; margin-bottom: 2rem; display: flex; align-items: center; gap: 10px; font-size: 0.875rem; }
    .status-banner.pending { background: var(--yellow-bg); color: var(--yellow); border: 1px solid #fde68a; }
    .status-banner.approved { background: var(--green-bg); color: var(--green); border: 1px solid #bbf7d0; }
    .status-banner.rejected { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    /* TABS */
    .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); }
    .tab { padding: 10px 18px; font-family: var(--font-body); font-size: 0.875rem; font-weight: 500; color: var(--ink-3); background: none; border: none; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.18s; }
    .tab:hover { color: var(--ink); }
    .tab.active { color: var(--accent-dark); border-bottom-color: var(--accent); }

    /* CARDS */
    .card { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 16px; padding: 1.75rem; margin-bottom: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .card-title { font-family: var(--font-head); font-size: 1.2rem; letter-spacing: 0.04em; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 2px solid var(--accent); color: var(--ink); }

    /* FORM */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 0; }
    .form-group.full { grid-column: 1/-1; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--ink-2); margin-bottom: 5px; }
    .label-hint { font-size: 0.75rem; color: var(--ink-3); font-weight: 400; margin-left: 4px; }
    input, select, textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 9px; font-family: var(--font-body); font-size: 0.9rem; color: var(--ink); background: var(--paper); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,215,0,0.18); background: #fff; }
    textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 11px 22px; border-radius: 9px; font-family: var(--font-body); font-size: 0.9rem; font-weight: 500; cursor: pointer; text-decoration: none; border: none; transition: all 0.18s; }
    .btn-primary { background: var(--accent); color: var(--ink); font-weight: 700; }
    .btn-primary:hover { background: var(--accent-2); transform: translateY(-1px); }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .btn-outline { background: transparent; color: var(--ink-2); border: 1.5px solid var(--border); }
    .btn-outline:hover { border-color: var(--ink); }
    .btn-danger { background: transparent; color: #dc2626; border: 1.5px solid #fca5a5; }
    .btn-danger:hover { background: #fee2e2; }

    .form-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }

    /* ALERTS */
    .alert { padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .alert.error { background: #fde8e2; color: #a02a0a; border: 1px solid #f9c4b3; display: block; }
    .alert.success { background: #e6f4ea; color: #1a6e2e; border: 1px solid #b7dfc2; display: block; }

    /* PREVIEW CARD */
    .preview-card { border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; display: block; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
    .preview-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); border-color: var(--accent); }
    .preview-banner { height: 8px; background: var(--accent); }
    .preview-body { padding: 1.25rem; }
    .preview-name { font-family: var(--font-head); font-size: 1.2rem; letter-spacing: 0.02em; margin-bottom: 4px; }
    .preview-cat { font-size: 0.75rem; color: var(--accent-dark); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .preview-desc { font-size: 0.85rem; color: var(--ink-2); font-weight: 300; line-height: 1.6; }
    .preview-meta { display: flex; gap: 1rem; margin-top: 0.75rem; font-size: 0.8rem; color: var(--ink-3); }

    /* NO LISTING */
    .no-listing { text-align: center; padding: 3rem; }
    .no-listing-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .no-listing h3 { font-family: var(--font-head); font-size: 1.4rem; letter-spacing: 0.04em; margin-bottom: 0.5rem; }
    .no-listing p { color: var(--ink-3); font-size: 0.875rem; margin-bottom: 1.5rem; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 1.25rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    .stat-value { font-family: var(--font-head); font-size: 2rem; letter-spacing: 0.03em; color: var(--accent-dark); }
    .stat-label { font-size: 0.8rem; color: var(--ink-3); margin-top: 3px; }

    /* SPINNER */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: 1fr; } .page { padding: 1.5rem 1.25rem 3rem; } nav { padding: 0 1.25rem; } }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <span class="logo-yellow">YELLOW</span>
      <span class="logo-pages">PAGES</span>
    </a>
    <div class="nav-right">
      <span class="nav-user" id="navUser"></span>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </nav>

  <div class="page" id="page" style="display:none">
    <div class="welcome">
      <h1 id="welcomeMsg">Welcome back!</h1>
      <p>Manage your business listing from here.</p>
    </div>
    <div class="alert" id="alert"></div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('overview')">Overview</button>
      <button class="tab" onclick="switchTab('edit')">Edit listing</button>
      <button class="tab" onclick="switchTab('settings')">Settings</button>
    </div>

    <!-- OVERVIEW -->
    <div class="tab-content active" id="tab-overview">
      <div id="statusBanner"></div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="statStatus">—</div><div class="stat-label">Listing status</div></div>
        <div class="stat-card"><div class="stat-value" id="statCategory">—</div><div class="stat-label">Category</div></div>
        <div class="stat-card"><div class="stat-value" id="statAffiliate">—</div><div class="stat-label">Affiliate link</div></div>
      </div>
      <div class="card">
        <div class="card-title">Your listing preview</div>
        <div id="listingPreview"></div>
      </div>
    </div>

    <!-- EDIT -->
    <div class="tab-content" id="tab-edit">
      <div class="card">
        <div class="card-title">Business information</div>
        <div class="alert" id="editAlert"></div>
        <div class="form-grid">
          <div class="form-group full">
            <label for="bizName">Business name</label>
            <input type="text" id="bizName" placeholder="e.g. Juan's Coffee Shop">
          </div>
          <div class="form-group">
            <label for="bizCategory">Category</label>
            <select id="bizCategory"><option value="">Select category</option></select>
          </div>
          <div class="form-group">
            <label for="bizPhone">Phone number</label>
            <input type="tel" id="bizPhone" placeholder="09123456789">
          </div>
          <div class="form-group full">
            <label for="bizLocation">Location / Address</label>
            <input type="text" id="bizLocation" placeholder="e.g. 123 Main St, Quezon City">
          </div>
          <div class="form-group full">
            <label for="bizDesc">Description</label>
            <textarea id="bizDesc" placeholder="Tell customers about your business…"></textarea>
          </div>
          <div class="form-group">
            <label for="bizWebsite">Website <span class="label-hint">(optional)</span></label>
            <input type="url" id="bizWebsite" placeholder="https://yourbusiness.com">
          </div>
          <div class="form-group">
            <label for="bizLogo">Logo URL <span class="label-hint">(optional)</span></label>
            <input type="url" id="bizLogo" placeholder="https://...your-logo.png">
          </div>
          <div class="form-group full">
            <label for="bizAffiliate">Affiliate link <span class="label-hint">(optional)</span></label>
            <input type="url" id="bizAffiliate" placeholder="https://...your-affiliate-link">
          </div>
        </div>
        <div class="form-actions" style="justify-content:flex-end">
          <button class="btn btn-primary" id="saveBtn" onclick="saveListing()">Save changes</button>
        </div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="tab-content" id="tab-settings">
      <div class="card">
        <div class="card-title">Account settings</div>
        <div class="form-group" style="margin-bottom:1rem">
          <label>Email address</label>
          <input type="email" id="settingsEmail" disabled style="opacity:0.6;cursor:not-allowed">
        </div>
        <div class="form-actions" style="justify-content:flex-end;margin-top:0;padding-top:0;border-top:none">
          <a href="/" class="btn btn-outline">Back to directory</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let currentBusiness = null;

    // ── Auth check ───────────────────────────────────────────
    async function init() {
      const token = localStorage.getItem('bizdir_token');
      if (!token) { window.location.href = '/pages/login'; return; }

      // Validate token
      try {
        const res = await fetch('/api/auth?action=validate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        const data = await res.json();
        if (!data.success) { logout(); return; }

        currentUser = { token, email: data.email, name: data.name };
        document.getElementById('welcomeMsg').textContent = `Welcome back, ${data.name || data.email.split('@')[0]}!`;
        document.getElementById('navUser').textContent = data.email;
        document.getElementById('settingsEmail').value = data.email;
        document.getElementById('page').style.display = 'block';

        await Promise.all([loadUserListing(data.email), loadCategories()]);
      } catch(e) {
        logout();
      }
    }

    function logout() {
      localStorage.removeItem('bizdir_token');
      localStorage.removeItem('bizdir_email');
      localStorage.removeItem('bizdir_name');
      window.location.href = '/pages/login';
    }

    async function loadUserListing(email) {
      try {
        const res = await fetch(`/api/listings?ownerEmail=${encodeURIComponent(email)}`);
        const data = await res.json();
        if (data.success && data.businesses?.length > 0) {
          currentBusiness = data.businesses[0];
          renderOverview(currentBusiness);
          populateEditForm(currentBusiness);
        } else {
          renderNoListing();
        }
      } catch(e) {
        renderNoListing();
      }
    }

    function renderOverview(b) {
      const statuses = {
        approved: { cls: 'approved', icon: '✓', msg: 'Your listing is live and visible to customers.' },
        pending:  { cls: 'pending',  icon: '⏳', msg: 'Your listing is under review.' },
        rejected: { cls: 'rejected', icon: '✕', msg: 'Your listing was rejected. Please edit and resubmit.' },
      };
      const s = statuses[b.status] || statuses.pending;
      document.getElementById('statusBanner').innerHTML = `<div class="status-banner ${s.cls}"><span>${s.icon}</span><span>${s.msg}</span></div>`;
      document.getElementById('statStatus').textContent = b.status || 'pending';
      document.getElementById('statCategory').textContent = b.category || '—';
      document.getElementById('statAffiliate').textContent = b.affiliateUrl ? 'Set' : 'None';
      document.getElementById('listingPreview').innerHTML = `
        <a class="preview-card" href="/pages/business?id=${esc(b.id)}" target="_blank">
          <div class="preview-banner"></div>
          <div class="preview-body">
            <div class="preview-name">${esc(b.name)}</div>
            <div class="preview-cat">${esc(b.category)}</div>
            <div class="preview-desc">${esc(b.description)}</div>
            <div class="preview-meta">
              <span>📍 ${esc(b.location)}</span>
              ${b.phone ? `<span>📞 ${esc(String(b.phone))}</span>` : ''}
            </div>
          </div>
        </a>`;
    }

    function renderNoListing() {
      document.getElementById('statusBanner').innerHTML = '';
      document.getElementById('statStatus').textContent = 'None';
      document.getElementById('statCategory').textContent = '—';
      document.getElementById('statAffiliate').textContent = '—';
      document.getElementById('listingPreview').innerHTML = `
        <div class="no-listing">
          <div class="no-listing-icon">🏪</div>
          <h3>No listing yet</h3>
          <p>You haven't created a business listing yet.</p>
          <button class="btn btn-primary" onclick="switchTab('edit')">Create your listing</button>
        </div>`;
    }

    function populateEditForm(b) {
      if (!b) return;
      document.getElementById('bizName').value = b.name || '';
      document.getElementById('bizPhone').value = b.phone || '';
      document.getElementById('bizLocation').value = b.location || '';
      document.getElementById('bizDesc').value = b.description || '';
      document.getElementById('bizWebsite').value = b.website || '';
      document.getElementById('bizLogo').value = b.logoUrl || '';
      document.getElementById('bizAffiliate').value = b.affiliateUrl || '';
      setTimeout(() => { document.getElementById('bizCategory').value = b.category || ''; }, 600);
    }

    async function loadCategories() {
      try {
        const res = await fetch('/api/categories');
        const data = await res.json();
        if (!data.success) return;
        const select = document.getElementById('bizCategory');
        data.categories.forEach(cat => {
          const opt = document.createElement('option');
          opt.value = cat.name; opt.textContent = cat.name;
          select.appendChild(opt);
        });
      } catch(e) { console.error(e); }
    }

    async function saveListing() {
        console.log("saveListing called"); 
      const btn = document.getElementById('saveBtn');
      clearAlert('editAlert');

      const payload = {
        name:         document.getElementById('bizName').value.trim(),
        category:     document.getElementById('bizCategory').value,
        phone:        document.getElementById('bizPhone').value.trim(),
        location:     document.getElementById('bizLocation').value.trim(),
        description:  document.getElementById('bizDesc').value.trim(),
        website:      document.getElementById('bizWebsite').value.trim(),
        logoUrl:      document.getElementById('bizLogo').value.trim(),
        affiliateUrl: document.getElementById('bizAffiliate').value.trim(),
      };

      const required = ['name','category','phone','location','description'];
      const missing = required.filter(f => !payload[f]);
      if (missing.length) { showAlert('editAlert', 'Please fill in: ' + missing.join(', '), 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Saving…';

      try {
        let res, data;
        if (currentBusiness) {
          res = await fetch('/api/listing', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: currentBusiness.id, ...payload }),
          });
        } else {
          res = await fetch('/api/listings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...payload, ownerEmail: currentUser.email, ownerName: currentUser.name || '' }),
          });
        }
        data = await res.json();
        if (!data.success) {
          showAlert('editAlert', data.error || 'Failed to save.', 'error');
        } else {
          showAlert('editAlert', currentBusiness ? 'Listing updated!' : 'Listing created! It will be reviewed shortly.', 'success');
          await loadUserListing(currentUser.email);
          if (!currentBusiness) switchTab('overview');
        }
      } catch(e) {
        showAlert('editAlert', 'Something went wrong.', 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Save changes';
    }

    async function confirmDelete() {
      if (!currentBusiness) return;
      if (!confirm(`Delete "${currentBusiness.name}"? This cannot be undone.`)) return;
      try {
        const res = await fetch('/api/listing', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: currentBusiness.id }),
        });
        const data = await res.json();
        if (data.success) {
          currentBusiness = null;
          renderNoListing();
          switchTab('overview');
          showAlert('alert', 'Listing deleted.', 'success');
        }
      } catch(e) { showAlert('alert', 'Failed to delete.', 'error'); }
    }

    function switchTab(name) {
      const tabs = ['overview','edit','settings'];
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', tabs[i] === name));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
    }

    function showAlert(id, msg, type) { const el = document.getElementById(id); el.textContent = msg; el.className = 'alert ' + type; }
    function clearAlert(id) { const el = document.getElementById(id); el.className = 'alert'; el.textContent = ''; }
    function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    init();
  </script>
</body>
</html>
