<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Yellow Pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0f0f0f; --ink-2: #2a2a2a; --ink-3: #666;
      --paper: #ffffff; --surface: #f4f4f4; --accent: #FFD700;
      --accent-2: #FFC200; --accent-dark: #B8960A;
      --border: #e4e4e4; --card-bg: #ffffff;
      --font-head: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body { font-family: var(--font-body); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }

    /* NAV */
    nav {
      background: var(--ink); border-bottom: 3px solid var(--accent);
      padding: 0 2rem; height: 60px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; line-height: 1; }
    .nav-logo .logo-yellow { background: var(--accent); color: var(--ink); font-family: var(--font-head); font-size: 1.5rem; letter-spacing: 0.02em; padding: 3px 9px 1px; border-radius: 4px 0 0 4px; }
    .nav-logo .logo-pages { background: transparent; color: var(--accent); font-family: var(--font-head); font-size: 1.5rem; letter-spacing: 0.05em; padding: 3px 9px 1px; border: 2px solid var(--accent); border-left: none; border-radius: 0 4px 4px 0; }
    .nav-link { font-size: 0.875rem; color: #bbb; text-decoration: none; font-weight: 500; }
    .nav-link:hover { color: var(--accent); }

    /* PAGE */
    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .card { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .card-accent { width: 40px; height: 4px; background: var(--accent); border-radius: 2px; margin-bottom: 1.5rem; }

    h1 { font-family: var(--font-head); font-size: 2.4rem; letter-spacing: 0.03em; margin-bottom: 0.4rem; }
    .subtitle { font-size: 0.9rem; color: var(--ink-3); font-weight: 300; margin-bottom: 2rem; }

    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--font-body); font-size: 0.95rem; color: var(--ink); background: var(--paper); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,215,0,0.18); background: #fff; }
    input::placeholder { color: var(--ink-3); }

    .btn-submit { width: 100%; padding: 13px; background: var(--accent); color: var(--ink); border: none; border-radius: 10px; font-family: var(--font-head); font-size: 1.2rem; letter-spacing: 0.05em; cursor: pointer; margin-top: 0.5rem; transition: background 0.18s, transform 0.18s; }
    .btn-submit:hover:not(:disabled) { background: var(--accent-2); transform: translateY(-1px); }
    .btn-submit:disabled { background: #ddd; color: #999; cursor: not-allowed; transform: none; }

    .footer-link { text-align: center; font-size: 0.875rem; color: var(--ink-3); margin-top: 1.25rem; }
    .footer-link a { color: var(--accent-dark); text-decoration: none; font-weight: 500; }
    .footer-link a:hover { text-decoration: underline; }

    .alert { padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .alert.error { background: #fff3cd; color: #7a5c00; border: 1px solid #ffe082; display: block; }
    .alert.success { background: #e6f4ea; color: #1a6e2e; border: 1px solid #b7dfc2; display: block; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) { .card { padding: 1.75rem; } nav { padding: 0 1.25rem; } }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <span class="logo-yellow">YELLOW</span>
      <span class="logo-pages">PAGES</span>
    </a>
    <a href="/pages/signup" class="nav-link">Create an account</a>
  </nav>

  <div class="page">
    <div class="card">
      <div class="card-accent"></div>
      <div class="alert" id="alert"></div>

      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to manage your business listing.</p>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
      </div>

      <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Log In</button>

      <div class="footer-link">Don't have an account? <a href="/pages/signup">Sign up free</a></div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('bizdir_token')) {
      window.location.href = '/pages/dashboard';
    }

    function showAlert(msg, type) { const el = document.getElementById('alert'); el.textContent = msg; el.className = 'alert ' + type; }
    function clearAlert() { const el = document.getElementById('alert'); el.className = 'alert'; el.textContent = ''; }

    async function handleLogin() {
      clearAlert();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !email.includes('@')) return showAlert('Please enter a valid email address.', 'error');
      if (!password)                       return showAlert('Please enter your password.', 'error');

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Logging in...';

      try {
        const res = await fetch('/api/auth?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert(data.error || 'Incorrect email or password.', 'error');
          btn.disabled = false;
          btn.textContent = 'Log In';
          return;
        }

        // Save session
        localStorage.setItem('bizdir_token', data.token);
        localStorage.setItem('bizdir_email', data.email);
        localStorage.setItem('bizdir_name',  data.name);

        showAlert('Logged in! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/pages/dashboard', 800);

      } catch(e) {
        showAlert('Could not connect. Please check your connection and try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
