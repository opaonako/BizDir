<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Yellow Pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0f0f0f; --ink-2: #2a2a2a; --ink-3: #666;
      --paper: #ffffff; --surface: #f4f4f4; --accent: #FFD700;
      --accent-2: #FFC200; --accent-dark: #B8960A;
      --border: #e4e4e4; --card-bg: #ffffff;
      --green: #16a34a; --green-bg: #dcfce7;
      --yellow: #854d0e; --yellow-bg: #fef9c3;
      --red: #991b1b; --red-bg: #fee2e2;
      --font-head: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body { font-family: var(--font-body); background: var(--paper); color: var(--ink); min-height: 100vh; }

    /* NAV */
    nav { background: var(--ink); border-bottom: 3px solid var(--accent); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; text-decoration: none; line-height: 1; gap: 8px; }
    .nav-logo .logo-yellow { background: var(--accent); color: var(--ink); font-family: var(--font-head); font-size: 1.5rem; letter-spacing: 0.02em; padding: 3px 9px 1px; border-radius: 4px 0 0 4px; }
    .nav-logo .logo-pages { background: transparent; color: var(--accent); font-family: var(--font-head); font-size: 1.5rem; letter-spacing: 0.05em; padding: 3px 9px 1px; border: 2px solid var(--accent); border-left: none; border-radius: 0 4px 4px 0; }
    .nav-badge { background: var(--accent); color: var(--ink); font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; font-family: var(--font-body); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-link { font-size: 0.85rem; color: #aaa; text-decoration: none; transition: color 0.2s; }
    .nav-link:hover { color: var(--accent); }
    .btn-logout { font-size: 0.82rem; color: #aaa; background: none; border: 1.5px solid #333; padding: 6px 14px; border-radius: 7px; cursor: pointer; font-family: var(--font-body); transition: all 0.18s; }
    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    /* PAGE */
    .page { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .page-header h1 { font-family: var(--font-head); font-size: 2.4rem; letter-spacing: 0.03em; }
    .page-header p { color: var(--ink-3); font-size: 0.875rem; margin-top: 3px; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    .stat-value { font-family: var(--font-head); font-size: 2rem; letter-spacing: 0.03em; }
    .stat-value.pending  { color: #d97706; }
    .stat-value.approved { color: var(--green); }
    .stat-value.rejected { color: #dc2626; }
    .stat-value.total    { color: var(--accent-dark); }
    .stat-label { font-size: 0.8rem; color: var(--ink-3); margin-top: 3px; }

    /* TABS */
    .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); }
    .tab { padding: 10px 18px; font-family: var(--font-body); font-size: 0.875rem; font-weight: 500; color: var(--ink-3); background: none; border: none; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.18s; display: flex; align-items: center; gap: 6px; }
    .tab:hover { color: var(--ink); }
    .tab.active { color: var(--accent-dark); border-bottom-color: var(--accent); }
    .tab-count { background: var(--surface); color: var(--ink-2); font-size: 0.7rem; font-weight: 700; padding: 1px 6px; border-radius: 10px; }
    .tab.active .tab-count { background: #fff3cd; color: var(--accent-dark); }

    /* LISTING CARDS */
    .listing-card { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; display: flex; align-items: flex-start; gap: 1.25rem; animation: fadeUp 0.3s both; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .listing-logo { width: 52px; height: 52px; border-radius: 10px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 1.3rem; color: var(--ink-2); flex-shrink: 0; overflow: hidden; border: 1.5px solid var(--border); }
    .listing-logo img { width: 100%; height: 100%; object-fit: cover; }
    .listing-info { flex: 1; min-width: 0; }
    .listing-name { font-family: var(--font-head); font-size: 1.1rem; letter-spacing: 0.02em; margin-bottom: 2px; }
    .listing-meta { font-size: 0.8rem; color: var(--ink-3); margin-bottom: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
    .listing-desc { font-size: 0.85rem; color: var(--ink-2); font-weight: 300; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .listing-owner { font-size: 0.78rem; color: var(--ink-3); margin-top: 6px; }
    .listing-actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }

    /* STATUS BADGES */
    .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
    .status-badge.pending  { background: var(--yellow-bg); color: var(--yellow); }
    .status-badge.approved { background: var(--green-bg);  color: var(--green); }
    .status-badge.rejected { background: var(--red-bg);    color: var(--red); }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-family: var(--font-body); font-size: 0.82rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.18s; text-decoration: none; white-space: nowrap; }
    .btn-approve { background: var(--green-bg); color: var(--green); border: 1px solid #bbf7d0; }
    .btn-approve:hover { background: #bbf7d0; }
    .btn-reject  { background: var(--red-bg);   color: var(--red);   border: 1px solid #fca5a5; }
    .btn-reject:hover  { background: #fca5a5; }
    .btn-view    { background: var(--surface);  color: var(--ink-2); border: 1px solid var(--border); }
    .btn-view:hover    { border-color: var(--ink); }
    .btn-restore { background: var(--yellow-bg); color: var(--yellow); border: 1px solid #fde68a; }
    .btn-restore:hover { background: #fde68a; }
    .btn-call    { background: var(--accent); color: var(--ink); border: 1px solid var(--accent); font-weight: 700; }
    .btn-call:hover    { background: var(--accent-2); }
    .btn-call.calling  { background: var(--accent-2); opacity: 0.7; cursor: not-allowed; }

    /* EMPTY / LOADING */
    .empty { text-align: center; padding: 4rem 2rem; color: var(--ink-3); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty h3 { font-family: var(--font-head); font-size: 1.4rem; letter-spacing: 0.04em; color: var(--ink); margin-bottom: 0.4rem; }
    .alert { padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1.5rem; display: none; }
    .alert.success { background: var(--green-bg); color: var(--green); border: 1px solid #bbf7d0; display: block; }
    .alert.error   { background: var(--red-bg);   color: var(--red);   border: 1px solid #fca5a5; display: block; }
    .loading { text-align: center; padding: 3rem; color: var(--ink-3); font-size: 0.9rem; }
    .spinner-dark { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent-dark); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    @keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(8px); } to { opacity:1; transform: scale(1) translateY(0); } }

    /* DIALER */
    .dialer-modal { background: var(--card-bg); border-radius: 20px; border: 1.5px solid var(--border); padding: 2rem; width: 320px; max-width: 94vw; box-shadow: 0 24px 64px rgba(0,0,0,0.15); animation: modalIn 0.22s ease; text-align: center; }
    .dialer-avatar-wrap { position: relative; display: inline-block; margin-bottom: 1rem; }
    .dialer-avatar { width: 68px; height: 68px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 1.7rem; color: var(--ink); margin: 0 auto; border: 2px solid var(--border); }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(1.6); opacity: 0; } }
    .dialer-avatar-wrap.ringing::after { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 3px solid var(--accent); animation: pulse-ring 1.1s ease-out infinite; }
    .dialer-name   { font-family: var(--font-head); font-size: 1.2rem; letter-spacing: 0.03em; margin-bottom: 4px; }
    .dialer-phone  { font-size: 0.875rem; color: var(--ink-3); margin-bottom: 1rem; }
    .dialer-status { font-size: 0.82rem; font-weight: 500; min-height: 20px; margin-bottom: 1.25rem; color: var(--ink-3); }
    .dialer-status.calling   { color: var(--accent-dark); }
    .dialer-status.connected { color: var(--green); }
    .dialer-status.ended     { color: var(--ink-3); }
    .dialer-status.error     { color: var(--red); }
    .dialer-timer  { font-family: var(--font-head); font-size: 2rem; letter-spacing: 0.05em; color: var(--ink); margin-bottom: 1.5rem; display: none; }
    .dialer-btns   { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 1rem; }
    .d-btn { width: 52px; height: 52px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; transition: all 0.18s; }
    .d-btn.big   { width: 68px; height: 68px; font-size: 1.5rem; }
    .d-btn.green { background: var(--green); color: #fff; }
    .d-btn.green:hover { background: #14803c; transform: scale(1.06); }
    .d-btn.red   { background: var(--red); color: #fff; }
    .d-btn.red:hover   { background: #7f1d1d; transform: scale(1.06); }
    .d-btn.gray  { background: var(--surface); color: var(--ink-2); }
    .d-btn.gray:hover  { background: var(--border); }
    .dialer-stage { font-size: 0.75rem; color: var(--ink-3); background: var(--surface); padding: 4px 10px; border-radius: 20px; margin-bottom: 1rem; display: none; }
    .dialer-notes { display: none; margin-top: 1rem; text-align: left; }
    .dialer-notes textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--font-body); font-size: 0.875rem; resize: none; outline: none; color: var(--ink); background: var(--card-bg); }
    .dialer-notes textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,215,0,0.15); }
    .dialer-notes-save { margin-top: 8px; width: 100%; padding: 10px; background: var(--accent); color: var(--ink); border: none; border-radius: 10px; font-family: var(--font-body); font-size: 0.875rem; font-weight: 700; cursor: pointer; }
    .dialer-notes-save:hover { background: var(--accent-2); }
    .dialer-close { margin-top: 8px; width: 100%; padding: 8px; background: none; color: var(--ink-3); border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--font-body); font-size: 0.82rem; cursor: pointer; transition: all 0.18s; }
    .dialer-close:hover { border-color: var(--ink-3); color: var(--ink); }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; font-weight: 500; z-index: 999; transition: transform 0.3s ease; pointer-events: none; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 640px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .listing-card { flex-direction: column; }
      .listing-actions { flex-direction: row; flex-wrap: wrap; }
      .page { padding: 1.5rem 1.25rem 3rem; }
      nav { padding: 0 1.25rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/pages/webphone" class="nav-link">📞 Webphone</a>
    <a href="/" class="nav-logo">
      <span class="logo-yellow">YELLOW</span>
      <span class="logo-pages">PAGES</span>
      <span class="nav-badge">ADMIN</span>
    </a>
    <div class="nav-right">
      <a href="/" class="nav-link">View site</a>
      <a href="/pages/dashboard" class="nav-link">Dashboard</a>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </nav>

  <div class="page" id="page" style="display:none">
    <div class="page-header">
      <div>
        <h1>Admin Panel</h1>
        <p>Review and manage all business listings.</p>
      </div>
    </div>

    <div class="alert" id="alert"></div>

    <div class="stats-row">
      <div class="stat"><div class="stat-value pending"  id="statPending">—</div><div class="stat-label">Pending review</div></div>
      <div class="stat"><div class="stat-value approved" id="statApproved">—</div><div class="stat-label">Approved</div></div>
      <div class="stat"><div class="stat-value rejected" id="statRejected">—</div><div class="stat-label">Rejected</div></div>
      <div class="stat"><div class="stat-value total"    id="statTotal">—</div><div class="stat-label">Total listings</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('pending')">Pending  <span class="tab-count" id="countPending">0</span></button>
      <button class="tab"        onclick="switchTab('approved')">Approved <span class="tab-count" id="countApproved">0</span></button>
      <button class="tab"        onclick="switchTab('rejected')">Rejected <span class="tab-count" id="countRejected">0</span></button>
      <button class="tab"        onclick="switchTab('all')">All listings <span class="tab-count" id="countAll">0</span></button>
    </div>

    <div class="tab-content active" id="tab-pending"><div class="loading"><span class="spinner-dark"></span>Loading…</div></div>
    <div class="tab-content"        id="tab-approved"></div>
    <div class="tab-content"        id="tab-rejected"></div>
    <div class="tab-content"        id="tab-all"></div>
  </div>

  <!-- DIALER MODAL -->
  <div class="modal-overlay" id="dialerModal">
    <div class="dialer-modal">
      <div class="dialer-avatar-wrap" id="dialerAvatarWrap">
        <div class="dialer-avatar" id="dialerAvatar">?</div>
      </div>
      <div class="dialer-name"   id="dialerName">—</div>
      <div class="dialer-phone"  id="dialerPhone">—</div>
      <div class="dialer-status" id="dialerStatus">Ready</div>
      <div class="dialer-stage"  id="dialerStage"></div>
      <div class="dialer-timer"  id="dialerTimer">0:00</div>
      <div class="dialer-btns"   id="dialerBtns"></div>
      <div class="dialer-notes"  id="dialerNotes">
        <textarea id="dialerNoteText" rows="3" placeholder="Add a note about this call…"></textarea>
        <button class="dialer-notes-save" onclick="saveNote()">Save note</button>
      </div>
      <button class="dialer-close" id="dialerCloseBtn" onclick="closeDialer()">Close</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    const ADMIN_EMAIL = "paolollenado@gmail.com";
    let allBusinesses = [];

    // ── INIT ──────────────────────────────────────────────────
    async function init() {
      const token = localStorage.getItem('bizdir_token');
      if (!token) { window.location.href = '/pages/login'; return; }
      try {
        const res  = await fetch('/api/auth?action=validate', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        const data = await res.json();
        if (!data.success) { logout(); return; }
        if (data.email !== ADMIN_EMAIL) {
          document.body.innerHTML = `<div style="text-align:center;padding:5rem 2rem;font-family:sans-serif"><h2>Access denied</h2><p style="margin-top:1rem;color:#666">This page is for administrators only.</p><a href="/" style="display:inline-block;margin-top:1.5rem;color:#B8960A;font-weight:600">← Back to directory</a></div>`;
          return;
        }
        document.getElementById('page').style.display = 'block';
        await loadAllListings();
      } catch(e) { logout(); }
    }

    function logout() {
      ['bizdir_token','bizdir_email','bizdir_name'].forEach(k => localStorage.removeItem(k));
      window.location.href = '/pages/login';
    }

    // ── LOAD LISTINGS ─────────────────────────────────────────
    async function loadAllListings() {
      try {
        const [pRes, aRes, rRes] = await Promise.all([
          fetch('/api/listings?status=pending&limit=500'),
          fetch('/api/listings?status=approved&limit=500'),
          fetch('/api/listings?status=rejected&limit=500'),
        ]);
        const [pData, aData, rData] = await Promise.all([pRes.json(), aRes.json(), rRes.json()]);
        const pending  = (pData.businesses  || []).filter(b => b.status === 'pending');
        const approved = (aData.businesses  || []).filter(b => b.status === 'approved');
        const rejected = (rData.businesses  || []).filter(b => b.status === 'rejected');
        allBusinesses  = [...pending, ...approved, ...rejected];
        document.getElementById('statPending').textContent   = pending.length;
        document.getElementById('statApproved').textContent  = approved.length;
        document.getElementById('statRejected').textContent  = rejected.length;
        document.getElementById('statTotal').textContent     = allBusinesses.length;
        document.getElementById('countPending').textContent  = pending.length;
        document.getElementById('countApproved').textContent = approved.length;
        document.getElementById('countRejected').textContent = rejected.length;
        document.getElementById('countAll').textContent      = allBusinesses.length;
        renderTab('pending',  pending);
        renderTab('approved', approved);
        renderTab('rejected', rejected);
        renderTab('all',      allBusinesses);
      } catch(e) { console.error('Failed to load listings', e); }
    }

    function renderTab(name, businesses) {
      const el = document.getElementById('tab-' + name);
      if (!businesses.length) {
        el.innerHTML = `<div class="empty"><div class="empty-icon">${name === 'pending' ? '🎉' : '📋'}</div><h3>${name === 'pending' ? 'All caught up!' : 'No listings here'}</h3><p>${name === 'pending' ? 'No listings pending review.' : 'Nothing to show.'}</p></div>`;
        return;
      }
      el.innerHTML = businesses.map((b, i) => `
        <div class="listing-card" id="card-${esc(b.id)}" style="animation-delay:${i*0.04}s">
          <div class="listing-logo">
            ${b.logoUrl ? `<img src="${esc(b.logoUrl)}" onerror="this.parentElement.textContent='${esc(b.name.charAt(0))}'"/>` : esc(b.name.charAt(0).toUpperCase())}
          </div>
          <div class="listing-info">
            <div class="listing-name">${esc(b.name)}</div>
            <div class="listing-meta">
              <span>📁 ${esc(b.category)}</span>
              <span>📍 ${esc(b.location)}</span>
              ${b.phone && b.phone !== 'Not listed' ? `<span>📞 ${esc(String(b.phone))}</span>` : ''}
            </div>
            <div class="listing-desc">${esc(b.description)}</div>
            <div class="listing-owner">Submitted by ${esc(b.ownerEmail||'—')} · ${formatDate(b.createdAt)}</div>
          </div>
          <div class="listing-actions">
            ${b.phone && b.phone !== 'Not listed' && String(b.phone).trim().length >= 7 ?
              `<button class="btn btn-call" id="callbtn-${esc(b.id)}" onclick="callLead('${esc(b.id)}','${esc(b.name)}','${esc(String(b.phone))}','${esc(b.address||b.location||'')}','${esc(b.category||'')}')">🤖 AI Call</button>` : ''}
            <span class="status-badge ${b.status}">${b.status}</span>
            <a href="/pages/business?id=${esc(b.id)}" target="_blank" class="btn btn-view">View →</a>
            ${b.status !== 'approved' ? `<button class="btn btn-approve" onclick="updateStatus('${esc(b.id)}','approved')">✓ Approve</button>` : ''}
            ${b.status !== 'rejected' ? `<button class="btn btn-reject"  onclick="updateStatus('${esc(b.id)}','rejected')">✕ Reject</button>`  : ''}
            ${b.status === 'rejected' ? `<button class="btn btn-restore" onclick="updateStatus('${esc(b.id)}','pending')">↺ Restore</button>` : ''}
          </div>
        </div>`).join('');
    }

    async function updateStatus(id, status) {
      const card = document.getElementById('card-' + id);
      if (card) card.style.opacity = '0.5';
      try {
        const res  = await fetch('/api/listing', {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, status }),
        });
        const data = await res.json();
        if (data.success) {
          showAlert({ approved:'✓ Approved and live!', rejected:'Listing rejected.', pending:'Restored to pending.' }[status] || 'Updated.', 'success');
          await loadAllListings();
        } else {
          showAlert(data.error || 'Failed.', 'error');
          if (card) card.style.opacity = '1';
        }
      } catch(e) {
        showAlert('Something went wrong.', 'error');
        if (card) card.style.opacity = '1';
      }
    }

    function switchTab(name) {
      const tabs = ['pending','approved','rejected','all'];
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', tabs[i] === name));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
    }

    // ── DIALER ────────────────────────────────────────────────
    let dialerLead  = null;
    let callTimer   = null;
    let callSeconds = 0;
    let callActive  = false;

    function callLead(id, name, phone, address, category) {
      dialerLead  = { id, name, phone, address, category };
      callActive  = false;
      callSeconds = 0;

      document.getElementById('dialerAvatar').textContent     = (name||'?').charAt(0).toUpperCase();
      document.getElementById('dialerName').textContent       = name;
      document.getElementById('dialerPhone').textContent      = phone;
      document.getElementById('dialerTimer').style.display    = 'none';
      document.getElementById('dialerTimer').textContent      = '0:00';
      document.getElementById('dialerNotes').style.display    = 'none';
      document.getElementById('dialerNoteText').value         = '';
      document.getElementById('dialerCloseBtn').style.display = 'block';
      document.getElementById('dialerStage').style.display    = 'none';
      document.getElementById('dialerAvatarWrap').classList.remove('ringing');
      setDialerStatus('Ready — Sarah will call this business', '');
      setDialerBtns('ready');
      document.getElementById('dialerModal').classList.add('open');
    }

    function closeDialer() {
      if (callActive) return;
      stopTimer();
      document.getElementById('dialerModal').classList.remove('open');
      document.getElementById('dialerAvatarWrap').classList.remove('ringing');
    }

    function setDialerStatus(msg, cls) {
      const el = document.getElementById('dialerStatus');
      el.textContent = msg;
      el.className   = 'dialer-status ' + cls;
    }

    function setDialerBtns(state) {
      const btns = document.getElementById('dialerBtns');
      if (state === 'ready') {
        btns.innerHTML = `<button class="d-btn big green" onclick="startAICall()">🤖</button>`;
      } else if (state === 'calling') {
        btns.innerHTML = `<div style="font-size:0.8rem;color:var(--ink-3)">Sarah is handling the call…</div>`;
      } else if (state === 'ended') {
        btns.innerHTML = `<button class="d-btn big green" onclick="startAICall()">🤖</button>`;
      }
    }

    async function startAICall() {
      if (!dialerLead) return;

      setDialerStatus('Initiating AI call…', 'calling');
      setDialerBtns('calling');
      document.getElementById('dialerAvatarWrap').classList.add('ringing');
      document.getElementById('dialerCloseBtn').style.display = 'none';

      const cardBtn = document.getElementById('callbtn-' + dialerLead.id);
      if (cardBtn) { cardBtn.disabled = true; cardBtn.classList.add('calling'); cardBtn.textContent = '📞 Calling…'; }

      try {
        const res  = await fetch('/api/voice/call', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            phone:        dialerLead.phone,
            businessName: dialerLead.name,
            address:      dialerLead.address  || '',
            category:     dialerLead.category || '',
            leadId:       dialerLead.id,
            callType:     'ai',
          }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Call failed');

        callActive  = true;
        document.getElementById('dialerTimer').style.display = 'block';
        document.getElementById('dialerStage').style.display = 'block';
        document.getElementById('dialerStage').textContent   = 'Stage: verify_name';
        startTimer();

        setDialerStatus('Sarah is calling ' + dialerLead.name + '…', 'calling');
        setDialerBtns('calling');
        showToast('🤖 Sarah is calling ' + dialerLead.name);

        startStatusPolling(dialerLead.id);

      } catch(e) {
        callActive = false;
        document.getElementById('dialerAvatarWrap').classList.remove('ringing');
        document.getElementById('dialerCloseBtn').style.display = 'block';
        setDialerStatus('Failed: ' + e.message, 'error');
        setDialerBtns('ended');
        showToast('Call failed: ' + e.message, true);
        if (cardBtn) { cardBtn.disabled = false; cardBtn.classList.remove('calling'); cardBtn.textContent = '🤖 AI Call'; }
      }
    }

    let pollInterval = null;
    function startStatusPolling(id) {
      let pollCount = 0;
      pollInterval = setInterval(async () => {
        pollCount++;
        if (pollCount > 60) { clearInterval(pollInterval); endAICallUI(id); return; }
        try {
          const res  = await fetch('/api/listings?id=' + id);
          const data = await res.json();
          const biz  = data.business;
          if (!biz) return;
          if (biz.description && biz.description.includes('Email:')) {
            document.getElementById('dialerStage').textContent = 'Stage: collecting info…';
          }
          if (biz.status === 'approved') {
            clearInterval(pollInterval);
            endAICallUI(id, 'approved');
            showToast('✅ ' + dialerLead.name + ' approved and live!');
            await loadAllListings();
          }
        } catch(e) { console.error('Poll error:', e); }
      }, 5000);
    }

    function endAICallUI(id, outcome) {
      callActive = false;
      stopTimer();
      document.getElementById('dialerAvatarWrap').classList.remove('ringing');
      const msg = outcome === 'approved'
        ? '✅ Listing approved — Sarah got the info!'
        : 'Call ended · ' + formatTime(callSeconds);
      setDialerStatus(msg, outcome === 'approved' ? 'connected' : 'ended');
      setDialerBtns('ended');
      document.getElementById('dialerNotes').style.display    = 'block';
      document.getElementById('dialerCloseBtn').style.display = 'block';
      const cardBtn = document.getElementById('callbtn-' + id);
      if (cardBtn) { cardBtn.disabled = false; cardBtn.classList.remove('calling'); cardBtn.textContent = '🤖 AI Call'; }
    }

    async function saveNote() {
      const note = document.getElementById('dialerNoteText').value.trim();
      if (note && dialerLead) {
        try {
          await fetch('/api/leads', {
            method:  'PUT',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ id: dialerLead.id, transcript: note }),
          });
          showToast('Note saved!');
        } catch(e) { showToast('Could not save note', true); }
      }
      if (pollInterval) clearInterval(pollInterval);
      closeDialer();
    }

    function startTimer() {
      callSeconds = 0;
      callTimer   = setInterval(() => {
        callSeconds++;
        document.getElementById('dialerTimer').textContent = formatTime(callSeconds);
      }, 1000);
    }
    function stopTimer()   { clearInterval(callTimer); callTimer = null; }
    function formatTime(s) { return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try { return new Date(dateStr).toLocaleDateString('en-PH', { month:'short', day:'numeric', year:'numeric' }); }
      catch { return dateStr; }
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg; el.className = 'alert ' + type;
      setTimeout(() => { el.className = 'alert'; }, 4000);
    }

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#991b1b' : 'var(--ink)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    init();
  </script>
</body>
</html>
