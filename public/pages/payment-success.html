<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — BizDir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #0f0f0f; --ink-3: #888; --paper: #faf9f6; --accent: #e84c1e; --green: #16a34a; --border: #e2ddd6; --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; }
    body { font-family: var(--font-body); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; border: 1px solid var(--border); border-radius: 20px; padding: 3rem 2.5rem; max-width: 480px; width: 100%; text-align: center; }
    .check { width: 72px; height: 72px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2rem; }
    h1 { font-family: var(--font-head); font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
    p { color: var(--ink-3); font-size: 0.95rem; line-height: 1.7; margin-bottom: 1.5rem; font-weight: 300; }
    .btn { display: inline-flex; align-items: center; padding: 12px 28px; background: var(--accent); color: #fff; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 0.95rem; font-family: var(--font-head); transition: background 0.18s; }
    .btn:hover { background: #c93d12; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Payment successful!</h1>
    <p>Thank you for your purchase. Our team will contact you within 24 hours to kick off your project. Check your email for a confirmation receipt.</p>
    <a href="/" class="btn">Back to BizDir →</a>
  </div>
</body>
</html>
